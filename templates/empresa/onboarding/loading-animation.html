<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pymax | Configurando tu Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #FFFFFF;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loading-container {
      text-align: center;
      max-width: 500px;
      padding: 40px;
      width: 100%;
    }

    .loading-logo {
      font-size: 40px;
      font-weight: 800;
      color: #1a1a1a;
      letter-spacing: -2px;
      margin-bottom: 40px;
    }

    .business-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 40px;
      border: 2px solid #1a1a1a;
      color: #1a1a1a;
    }

    .spinner-wrap {
      margin-bottom: 32px;
      position: relative;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .spinner {
      width: 70px;
      height: 70px;
      border: 3px solid #E5E7EB;
      border-top-color: #1a1a1a;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    .spinner-inner {
      position: absolute;
      width: 50px;
      height: 50px;
      border: 3px solid #E5E7EB;
      border-bottom-color: #64748b;
      border-radius: 50%;
      animation: spin 1.4s linear infinite reverse;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-message {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
      min-height: 30px;
    }

    .loading-submessage {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 32px;
      min-height: 20px;
    }

    .progress-wrap {
      height: 6px;
      background: #E5E7EB;
      border-radius: 100px;
      overflow: hidden;
      margin-bottom: 32px;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #1a1a1a, #475569);
      border-radius: 100px;
      width: 0%;
      transition: width 0.5s ease-out;
    }

    .steps-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-start;
      max-width: 360px;
      margin: 0 auto;
    }

    .step-item {
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0;
      transform: translateX(-16px);
      transition: all 0.3s ease-out;
    }

    .step-item.visible {
      opacity: 1;
      transform: translateX(0);
    }

    .step-icon {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #10b981;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .step-text {
      font-size: 13px;
      color: #475569;
      font-weight: 500;
    }
  </style>
</head>

<body>
  <div class="loading-container">

    <div class="loading-logo">PYMAX</div>

    <div class="business-badge" id="businessBadge">
      ⚙️ Configurando tu dashboard...
    </div>

    <div class="spinner-wrap">
      <div class="spinner"></div>
      <div class="spinner-inner"></div>
    </div>

    <div class="loading-message" id="loadingMessage">Inicializando...</div>
    <div class="loading-submessage" id="loadingSubmessage">Preparando el sistema</div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="steps-list" id="stepsList"></div>

  </div>

  <script>
    // Datos de negocios inline
    var businessData = {
      'tecnico':     { icon: '🔧', label: 'Técnico & Talleres',      color: '#3b82f6' },
      'gastronomia': { icon: '🍳', label: 'Gastronómico',            color: '#f59e0b' },
      'profesional': { icon: '💼', label: 'Servicios Profesionales', color: '#8b5cf6' },
      'bienestar':   { icon: '💪', label: 'Bienestar & Recurrencia', color: '#10b981' },
      'retail':      { icon: '🛒', label: 'Retail & Almacenes',      color: '#ec4899' }
    };

    var config = null;

    var sequence = [
      { msg: 'Cargando tu dashboard',     sub: 'Configurando paneles',            pct: 25,  step: 'Dashboard listo'       },
      { msg: 'Ajustando widgets',         sub: 'Adaptando a tu tipo de negocio',  pct: 55,  step: 'Widgets personalizados' },
      { msg: 'Activando Semáforo Pymax',  sub: 'Preparando indicadores de salud', pct: 80,  step: 'Semáforo activo'        },
      { msg: '¡Todo listo! 🚀',          sub: 'Ingresando al dashboard...',      pct: 100, step: null                    }
    ];

    function delay(ms) {
      return new Promise(function(resolve) { setTimeout(resolve, ms); });
    }

    function goToDashboard() {
      localStorage.setItem('pymax_onboarding_completed', 'true');
      window.location.href = '/empresa/essential';
    }

    function setMsg(msg, sub) {
      document.getElementById('loadingMessage').textContent = msg;
      document.getElementById('loadingSubmessage').textContent = sub;
    }

    function setProgress(pct) {
      document.getElementById('progressBar').style.width = pct + '%';
    }

    function addStep(text) {
      var list = document.getElementById('stepsList');
      var el = document.createElement('div');
      el.className = 'step-item';
      el.innerHTML = '<div class="step-icon">✓</div><div class="step-text">' + text + '</div>';
      list.appendChild(el);
      setTimeout(function() { el.classList.add('visible'); }, 30);
    }

    async function run() {
      for (var i = 0; i < sequence.length; i++) {
        var s = sequence[i];
        setMsg(s.msg, s.sub);
        setProgress(s.pct);
        await delay(750);
        if (s.step) addStep(s.step);
      }
      goToDashboard();
    }

    document.addEventListener('DOMContentLoaded', function() {
      // Safety redirect máximo en 6 segundos
      setTimeout(goToDashboard, 6000);

      var json = localStorage.getItem('pymax_onboarding_config');
      if (!json) {
        window.location.href = '/empresa/onboarding';
        return;
      }

      try {
        config = JSON.parse(json);
      } catch(e) {
        window.location.href = '/empresa/onboarding';
        return;
      }

      // Actualizar badge
      var badge = document.getElementById('businessBadge');
      var bd = businessData[config.business_type];
      if (bd && badge) {
        badge.textContent = bd.icon + ' Configurando ' + bd.label;
        badge.style.color = bd.color;
        badge.style.borderColor = bd.color;
      }

      run();
    });
  </script>
</body>
</html>
