<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pymax | Punto de Equilibrio Dinámico</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

<body class="bg-gray-50">
  <div class="max-w-6xl mx-auto p-8">
    <!-- Header -->
    <div class="mb-8">
      <a href="{{ url_for('essential_panel') }}" class="inline-flex items-center text-gray-600 hover:text-gray-900 mb-4">
        <i class="ph-bold ph-arrow-left mr-2"></i> Volver al Dashboard
      </a>
      <h1 class="text-3xl font-bold text-gray-900 mb-2">⚖️ Calculadora de Punto de Equilibrio</h1>
      <p class="text-gray-600">Descubre cuánto debes vender HOY para ser rentable</p>
    </div>

    <!-- Resultado Principal -->
    <div class="bg-gradient-to-br from-blue-600 to-blue-800 rounded-2xl p-8 text-white mb-6 shadow-lg">
      <div class="text-center">
        <div class="text-sm font-semibold uppercase mb-2 opacity-90">Debes vender HOY</div>
        <div class="text-6xl font-bold mb-2" id="ventasDiarias">$0</div>
        <div class="text-sm opacity-90" id="descripcion">Para cubrir tus gastos fijos y variables</div>
      </div>
    </div>

    <!-- Configuración -->
    <div class="bg-white rounded-xl p-6 shadow-sm mb-6">
      <h2 class="text-lg font-semibold mb-4">Configurar Parámetros</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Gastos Fijos Mensuales</label>
          <input type="number" id="gastosFijos" class="w-full px-4 py-2 border rounded-lg" value="500000" onchange="calcularPuntoEquilibrio()">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Gastos Variables (%)</label>
          <input type="number" id="gastosVariables" class="w-full px-4 py-2 border rounded-lg" value="30" onchange="calcularPuntoEquilibrio()">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Precio Promedio de Venta</label>
          <input type="number" id="precioPromedio" class="w-full px-4 py-2 border rounded-lg" value="25000" onchange="calcularPuntoEquilibrio()">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Días Hábiles/Mes</label>
          <input type="number" id="diasHabiles" class="w-full px-4 py-2 border rounded-lg" value="22" onchange="calcularPuntoEquilibrio()">
        </div>
      </div>
    </div>

    <!-- Métricas -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div class="bg-white rounded-xl p-6 shadow-sm">
        <div class="text-sm text-gray-600 mb-2">Ventas Mensuales Necesarias</div>
        <div class="text-3xl font-bold text-gray-900" id="ventasMensuales">$0</div>
      </div>
      <div class="bg-white rounded-xl p-6 shadow-sm">
        <div class="text-sm text-gray-600 mb-2">Unidades por Día</div>
        <div class="text-3xl font-bold text-blue-600" id="unidadesDia">0</div>
      </div>
      <div class="bg-white rounded-xl p-6 shadow-sm">
        <div class="text-sm text-gray-600 mb-2">Margen de Contribución</div>
        <div class="text-3xl font-bold text-green-600" id="margenContribucion">0%</div>
      </div>
    </div>

    <!-- Gráfico -->
    <div class="bg-white rounded-xl p-6 shadow-sm">
      <h2 class="text-lg font-semibold mb-4">Visualización</h2>
      <canvas id="chartEquilibrio" height="100"></canvas>
    </div>
  </div>

  <script>
    function calcularPuntoEquilibrio() {
      const gastosFijos = parseFloat(document.getElementById('gastosFijos').value);
      const gastosVariablesPct = parseFloat(document.getElementById('gastosVariables').value);
      const precioPromedio = parseFloat(document.getElementById('precioPromedio').value);
      const diasHabiles = parseFloat(document.getElementById('diasHabiles').value);
      
      // Cálculos
      const margenContribucionPct = 100 - gastosVariablesPct;
      const ventasMensuales = gastosFijos / (margenContribucionPct / 100);
      const ventasDiarias = ventasMensuales / diasHabiles;
      const unidadesDia = Math.ceil(ventasDiarias / precioPromedio);
      
      // Actualizar UI
      document.getElementById('ventasDiarias').textContent = '$' + Math.round(ventasDiarias).toLocaleString();
      document.getElementById('ventasMensuales').textContent = '$' + Math.round(ventasMensuales).toLocaleString();
      document.getElementById('unidadesDia').textContent = unidadesDia;
      document.getElementById('margenContribucion').textContent = margenContribucionPct.toFixed(1) + '%';
      document.getElementById('descripcion').textContent = `Equivale a ${unidadesDia} ventas de $${precioPromedio.toLocaleString()} cada día`;
      
      // Actualizar gráfico
      actualizarGrafico(gastosFijos, ventasMensuales, ventasMensuales * 0.7);
    }
    
    let chart;
    function actualizarGrafico(fijos, equilibrio, actual) {
      const ctx = document.getElementById('chartEquilibrio');
      
      if (chart) chart.destroy();
      
      chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['Gastos Fijos', 'Punto Equilibrio', 'Ventas Actuales'],
          datasets: [{
            data: [fijos, equilibrio, actual],
            backgroundColor: ['#ef4444', '#3b82f6', '#10b981']
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            y: {
              beginAtZero: true,
              ticks: {
                callback: value => '$' + value.toLocaleString()
              }
            }
          }
        }
      });
    }
    
    // Calcular al cargar
    calcularPuntoEquilibrio();
  </script>
</body>
</html>
