<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pymax | Modo Orden Express</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body class="bg-gray-900">
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-2xl w-full">
      <!-- Header Minimalista -->
      <div class="text-center mb-8">
        <a href="{{ url_for('essential_panel') }}" class="inline-flex items-center text-gray-400 hover:text-white mb-4">
          <i class="ph-bold ph-arrow-left mr-2"></i> Salir
        </a>
        <h1 class="text-4xl font-bold text-white mb-2">⚡ Modo Express</h1>
        <p class="text-gray-400">Registra en menos de 30 segundos</p>
      </div>

      <!-- Timer -->
      <div class="text-center mb-6">
        <div class="text-6xl font-bold text-blue-400" id="timer">00:00</div>
        <div class="text-sm text-gray-500 mt-2">Tu récord: 18 segundos</div>
      </div>

      <!-- Formulario Ultra-Rápido -->
      <div class="bg-gray-800 rounded-2xl p-8 shadow-2xl">
        <form onsubmit="registrarExpress(event)" id="formExpress">
          <!-- Tipo -->
          <div class="mb-6">
            <div class="grid grid-cols-2 gap-4">
              <button type="button" onclick="seleccionarTipo('ingreso')" id="btnIngreso" 
                class="py-6 rounded-xl border-2 border-gray-700 hover:border-green-500 transition text-white font-semibold">
                <i class="ph-bold ph-arrow-up text-3xl text-green-500 mb-2"></i>
                <div>INGRESO</div>
              </button>
              <button type="button" onclick="seleccionarTipo('gasto')" id="btnGasto"
                class="py-6 rounded-xl border-2 border-gray-700 hover:border-red-500 transition text-white font-semibold">
                <i class="ph-bold ph-arrow-down text-3xl text-red-500 mb-2"></i>
                <div>GASTO</div>
              </button>
            </div>
          </div>

          <!-- Monto -->
          <div class="mb-6">
            <label class="block text-gray-400 text-sm font-semibold mb-2">MONTO</label>
            <input type="number" id="monto" required autofocus
              class="w-full px-6 py-4 bg-gray-700 text-white text-3xl font-bold rounded-xl border-2 border-gray-600 focus:border-blue-500 focus:outline-none"
              placeholder="$0">
          </div>

          <!-- Descripción Rápida -->
          <div class="mb-6">
            <label class="block text-gray-400 text-sm font-semibold mb-2">CONCEPTO</label>
            <input type="text" id="concepto" required
              class="w-full px-6 py-4 bg-gray-700 text-white text-lg rounded-xl border-2 border-gray-600 focus:border-blue-500 focus:outline-none"
              placeholder="Ej: Venta cliente, Compra insumos...">
          </div>

          <!-- Templates Rápidos -->
          <div class="mb-6">
            <label class="block text-gray-400 text-sm font-semibold mb-2">PLANTILLAS RÁPIDAS</label>
            <div class="grid grid-cols-3 gap-2">
              <button type="button" onclick="aplicarPlantilla('Arriendo', 500000)" 
                class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm text-white">
                Arriendo
              </button>
              <button type="button" onclick="aplicarPlantilla('Servicios', 80000)" 
                class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm text-white">
                Servicios
              </button>
              <button type="button" onclick="aplicarPlantilla('Venta Producto', 25000)" 
                class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm text-white">
                Producto
              </button>
            </div>
          </div>

          <!-- Botón Registrar -->
          <button type="submit" 
            class="w-full py-5 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-bold text-xl rounded-xl shadow-lg transition transform hover:scale-105">
            <i class="ph-bold ph-lightning mr-2"></i>REGISTRAR AHORA
          </button>

          <!-- Atajos -->
          <div class="mt-4 text-center text-xs text-gray-500">
            Atajos: Enter ↵ para enviar | Esc para cancelar | Tab para siguiente campo
          </div>
        </form>
      </div>

      <!-- Últimos Registros -->
      <div class="mt-6 bg-gray-800 rounded-xl p-4">
        <div class="text-sm text-gray-400 font-semibold mb-3">ÚLTIMOS REGISTROS</div>
        <div id="ultimosRegistros" class="space-y-2"></div>
      </div>
    </div>
  </div>

  <script>
    let tipoSeleccionado = null;
    let timerInterval;
    let seconds = 0;

    // Iniciar timer al cargar
    window.addEventListener('load', () => {
      timerInterval = setInterval(() => {
        seconds++;
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        document.getElementById('timer').textContent = 
          `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
      }, 1000);
    });

    function seleccionarTipo(tipo) {
      tipoSeleccionado = tipo;
      document.getElementById('btnIngreso').classList.toggle('border-green-500', tipo === 'ingreso');
      document.getElementById('btnGasto').classList.toggle('border-red-500', tipo === 'gasto');
    }

    function aplicarPlantilla(concepto, monto) {
      document.getElementById('concepto').value = concepto;
      document.getElementById('monto').value = monto;
      document.getElementById('concepto').focus();
    }

    function registrarExpress(e) {
      e.preventDefault();
      
      if (!tipoSeleccionado) {
        alert('Selecciona INGRESO o GASTO');
        return;
      }

      const monto = document.getElementById('monto').value;
      const concepto = document.getElementById('concepto').value;
      
      // Detener timer
      clearInterval(timerInterval);
      
      // Guardar (aquí integrarías con backend/Supabase)
      const registro = {
        tipo: tipoSeleccionado,
        monto: monto,
        concepto: concepto,
        tiempo: seconds,
        fecha: new Date().toLocaleDateString()
      };
      
      console.log('Registro guardado:', registro);
      
      // Agregar a últimos registros
      const ultimosDiv = document.getElementById('ultimosRegistros');
      const color = tipoSeleccionado === 'ingreso' ? 'green' : 'red';
      ultimosDiv.innerHTML = `
        <div class="flex justify-between items-center text-sm bg-gray-700 px-3 py-2 rounded">
          <span class="text-${color}-400 font-semibold">${tipoSeleccionado.toUpperCase()}</span>
          <span class="text-white">$${parseInt(monto).toLocaleString()}</span>
          <span class="text-gray-400">${concepto}</span>
          <span class="text-blue-400">${seconds}s</span>
        </div>
      ` + ultimosDiv.innerHTML;
      
      // Reset
      document.getElementById('formExpress').reset();
      tipoSeleccionado = null;
      seconds = 0;
      document.getElementById('btnIngreso').classList.remove('border-green-500');
      document.getElementById('btnGasto').classList.remove('border-red-500');
      
      // Reiniciar timer
      timerInterval = setInterval(() => {
        seconds++;
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        document.getElementById('timer').textContent = 
          `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
      }, 1000);
      
      // Feedback visual
      alert(`✅ ¡Registrado en ${registro.tiempo} segundos!`);
    }

    // Atajos de teclado
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') window.location.href = '{{ url_for("essential_panel") }}';
      if (e.key === 'i') seleccionarTipo('ingreso');
      if (e.key === 'g') seleccionarTipo('gasto');
    });
  </script>
</body>
</html>
